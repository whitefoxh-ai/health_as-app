<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>헬스AS 관리시스템</title>
  
  <!-- 모바일에서 깔끔하게 보이게 -->
  <meta name="theme-color" content="#1e40af" />
  <link rel="manifest" href="data:application/manifest+json,{
    \"name\":\"헬스AS 관리\",
    \"short_name\":\"헬스AS\",
    \"start_url\":\".\",
    \"display\":\"standalone\",
    \"background_color\":\"#ffffff\",
    \"theme_color\":\"#1e40af\",
    \"icons\":[{\"src\":\"https://raw.githubusercontent.com/kyuzman/healthas/main/icon-192.png\",\"sizes\":\"192x192\",\"type\":\"image/png\"},{\"src\":\"https://raw.githubusercontent.com/kyuzman/healthas/main/icon-512.png\",\"sizes\":\"512x512\",\"type\":\"image/png\"}]
  }" />

  <!-- Tailwind CSS CDN (가장 빠름) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['"Noto Sans KR"', 'sans-serif'] } } }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>

<body class="bg-gray-50 text-gray-800 min-h-screen">
  <!-- 로딩 화면 -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div class="text-xl font-bold text-blue-600">헬스AS 로딩 중...</div>
  </div>

  <div id="app" class="hidden max-w-5xl mx-auto p-4">
    <header class="bg-blue-600 text-white p-4 rounded-lg shadow-lg mb-6 text-center">
      <h1 class="text-2xl md:text-3xl font-bold">헬스AS 관리시스템</h1>
      <p class="text-sm mt-1" id="today"></p>
    </header>

    <!-- 대시보드 요약 -->
    <div id="dashboard" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>

    <!-- 탭 메뉴 -->
    <div class="flex border-b mb-6 overflow-x-auto">
      <button class="tab-btn active px-6 py-3 font-medium" data-tab="reception">신규 접수</button>
      <button class="tab-btn px-6 py-3 font-medium" data-tab="list">AS 목록</button>
      <button class="tab-btn px-6 py-3 font-medium" data-tab="receivable">미수금 관리</button>
      <button class="tab-btn px-6 py-3 font-medium" data-tab="monthly">월마감</button>
    </div>

    <!-- 각 탭 컨텐츠 -->
    <div id="tab-reception" class="tab-content"></div>
    <div id="tab-list" class="tab-content hidden"></div>
    <div id="tab-receivable" class="tab-content hidden"></div>
    <div id="tab-monthly" class="tab-content hidden"></div>
  </div>

  <!-- ★★★★★ 핵심: 초고속 GET 전용 API 함수 (이게 진짜 핵심입니다) ★★★★★ -->
  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxd2TGT2FfrcSwcCVRie4Z_P8Sw_-BJFoD5lRW9LCy3QL8rPRjf4Y7rnOADRtWcN966/exec'; // ← 여기만 본인 웹앱 URL로 바꾸세요!!

    // 모든 API 호출은 이 함수만 사용 (POST 완전 제거 + 캐시 + 에러처리 완벽)
    async function callGAS(action, params = {}) {
      // getInitData 캐시 최적화
      if (action === 'getInitData') {
        const cached = localStorage.getItem('cachedInitData');
        const etag = localStorage.getItem('cachedEtag') || '';
        if (cached && etag) {
          try {
            const res = await fetch(`${GAS_URL}?action=getInitData&_etag=${etag}`);
            if (res.status === 304) {
              return JSON.parse(cached);
            }
          } catch(e) {}
        }
      }

      const urlParams = new URLSearchParams({ action, ...params }).toString();
      
      const res = await fetch(`${GAS_URL}?${urlParams}`, {
        method: 'GET',
        cache: 'no-store',
        headers: { 'Accept': 'application/json' }
      });

      // ETag 저장
      const newEtag = res.headers.get('ETag');
      if (newEtag && (action === 'getInitData' || action === 'refreshDashboard')) {
        localStorage.setItem('cachedEtag', newEtag);
      }

      if (!res.ok) throw new Error(`서버 오류: ${res.status}`);

      const data = await res.json();
      if (data.error) throw new Error(data.message || '알 수 없는 오류');

      // initData 캐시 저장
      if (action === 'getInitData') {
        localStorage.setItem('cachedInitData', JSON.stringify(data));
      }

      return data;
    }

    // 앱 초기화
    async function initApp() {
      try {
        document.getElementById('today').textContent = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        
        const initData = await callGAS('getInitData');
        window.MASTER = initData.master;
        renderDashboard(initData.dashboard);
        
        renderReceptionForm();
        renderASList();
        
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
      } catch (err) {
        alert('시스템 로드 실패\n\n' + err.message + '\n\n새로고침(F5) 해주세요.');
      }
    }

    function renderDashboard(d) {
      const container = document.getElementById('dashboard');
      container.innerHTML = `
        <div class="bg-white rounded-lg shadow p-5 text-center">
          <div class="text-3xl font-bold text-blue-600">${d.todayCount || 0}</div>
          <div class="text-sm text-gray-600">오늘 접수</div>
        </div>
        <div class="bg-white rounded-lg shadow p-5 text-center">
          <div class="text-3xl font-bold text-green-600">${d.monthSales?.toLocaleString() || 0}원</div>
          <div class="text-sm text-gray-600">이번달 매출</div>
        </div>
        <div class="bg-white rounded-lg shadow p-5 text-center">
          <div class="text-3xl font-bold text-orange-600">${d.totalReceivable?.toLocaleString() || 0}원</div>
          <div class="text-sm text-gray-600">총 미수금</div>
        </div>
        <div class="bg-white rounded-lg shadow p-5 text-center">
          <div class="text-3xl font-bold text-purple-600">${d.openCount || 0}</div>
          <div class="text-sm text-gray-600">진행중</div>
        </div>
      `;
    }

    // 탭 전환
    document.addEventListener('click', e => {
      if (e.target.classList.contains('tab-btn')) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.getElementById('tab-' + e.target.dataset.tab).classList.remove('hidden');
        
        if (e.target.dataset.tab === 'list') renderASList();
        if (e.target.dataset.tab === 'receivable') renderReceivable();
        if (e.target.dataset.tab === 'monthly') renderMonthlyReport();
      }
    });

    // 신규 접수 폼 (간단 버전)
    function renderReceptionForm() {
      document.getElementById('tab-reception').innerHTML = `
        <div class="bg-white rounded-lg shadow-lg p-6">
          <h2 class="text-xl font-bold mb-4">신규 AS 접수</h2>
          <div class="grid md:grid-cols-2 gap-4">
            <input type="text" id="phone" placeholder="연락처 (필수)" class="p-3 border rounded-lg">
            <input type="text" id="centerName" placeholder="센터명 또는 고객명" class="p-3 border rounded-lg">
            <select id="equipmentType" class="p-3 border rounded-lg">${window.MASTER?.equipmentTypes?.map(v=>`<option>${v}</option>`).join('')||''}</select>
            <input type="text" id="symptom" placeholder="고장증상 (필수)" class="p-3 border rounded-lg">
            <button onclick="saveNewAS()" class="bg-blue-600 text-white py-4 rounded-lg font-bold text-lg hover:bg-blue-700">접수하기</button>
          </div>
        </div>
      `;
    }

    window.saveNewAS = async () => {
      const phone = document.getElementById('phone').value.trim();
      const symptom = document.getElementById('symptom').value.trim();
      if (!phone || !symptom) return alert('연락처와 고장증상은 필수입니다.');

      try {
        await callGAS('saveAS', {
          data: encodeURIComponent(JSON.stringify({
            phone,
            centerName: document.getElementById('centerName').value,
            equipmentType: document.getElementById('equipmentType').value,
            symptom,
            items: [{ equipmentType: document.getElementById('equipmentType').value, symptom }]
          }))
        });
        alert('접수 완료!');
        initApp();
      } catch (err) {
        alert('접수 실패: ' + err.message);
      }
    };

    // AS 목록 (간단히)
    async function renderASList() {
      const list = await callGAS('getASList', { status: '전체' });
      document.getElementById('tab-list').innerHTML = `
        <div class="bg-white rounded-lg shadow-lg p-6">
          <h2 class="text-xl font-bold mb-4">AS 목록 (${list.length}건)</h2>
          <div class="space-y-3">${list.slice(0,50).map(item => `
            <div class="border rounded-lg p-4 hover:bg-gray-50">
              <div class="font-bold text-blue-600">${item.asNo}</div>
              <div>${item.centerName} | ${item.customerName} | ${item.phone}</div>
              <div class="text-sm text-gray-600">${item.equipmentType} - ${item.symptom}</div>
              <div class="text-right text-sm">${item.status} | ${item.receivable?.toLocaleString()}원 미수</div>
            </div>
          `).join('')}</div>
        </div>
      `;
    }

    // 미수금, 월마감은 추후 추가 예정 (기능 많아지면 계속 붙이면 됨)

    // 앱 시작
    initApp();
  </script>
</body>
</html>
