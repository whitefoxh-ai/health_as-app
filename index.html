<script>

// ========== 설정 (여기만 수정) ==========
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwrvzoYr8ETimzDhqMmLIWzxnttO8WDhlv8fRYmNo3D_5ZoM3jiQ1bYp1aG3busVsxq/exec';
// ========================================

let MASTER_DATA = null;
let CACHE_TIMESTAMP = 0;
let itemIndex = 0;

// =====================================================
// GET 전용 API 호출
// =====================================================
async function callGAS(action, params = {}) {
  try {
    showLoading(true);

    if (action === 'getInitData') {
      const now = Date.now();
      const cached = localStorage.getItem('cachedInitData');
      if (cached && CACHE_TIMESTAMP && (now - CACHE_TIMESTAMP < 300000)) {
        const data = JSON.parse(cached);
        MASTER_DATA = data.master;
        showLoading(false);
        return data;
      }
    }

    const urlParams = new URLSearchParams({ action, ...params });
    const url = `${GAS_URL}?${urlParams.toString()}`;

    const response = await fetch(url, {
      method: 'GET',
      cache: 'no-store',
      headers: { 'Accept': 'application/json' }
    });

    if (!response.ok) throw new Error(`서버 오류 (HTTP ${response.status})`);

    const data = await response.json();
    if (data.error) throw new Error(data.message || '알 수 없는 오류');

    if (action === 'getInitData') {
      localStorage.setItem('cachedInitData', JSON.stringify(data));
      CACHE_TIMESTAMP = Date.now();
      MASTER_DATA = data.master;
    }

    if (['saveAS', 'saveASUpdate', 'deleteAS', 'addPayment', 'addGroupPayment'].includes(action)) {
      localStorage.removeItem('cachedInitData');
      CACHE_TIMESTAMP = 0;
    }

    showLoading(false);
    return data;

  } catch (err) {
    showLoading(false);
    console.error('API 오류:', err);
    alert('⚠️ 오류 발생\n\n' + err.message);
    throw err;
  }
}

// =====================================================
// 초기화
// =====================================================
async function initApp() {
  try {
    const today = new Date();
    document.getElementById('todayDate').textContent = 
      today.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });

    const initData = await callGAS('getInitData');
    MASTER_DATA = initData.master;
    
    renderHomeTab(initData.dashboard);

  } catch (err) {
    alert('시스템 초기화 실패\n새로고침(F5) 해주세요.');
  }
}

function switchTab(tabName) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
  document.querySelector(`[data-tab="${tabName}"]`)?.classList.add('tab-active');
  
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  document.getElementById('tab-' + tabName).style.display = 'block';
  
  if (tabName === 'home') loadHomeTab();
  if (tabName === 'reception') renderReceptionTab();
  if (tabName === 'list') renderListTab();
  if (tabName === 'receivable') renderReceivableTab();
  if (tabName === 'monthly') renderMonthlyTab();
}

async function loadHomeTab() {
  const dash = await callGAS('refreshDashboard');
  renderHomeTab(dash);
}

// =====================================================
// 신규접수: 장비별 금액 계산 (수량 × 단가)
// =====================================================
function calcItemRow(idx) {
  // 1. AS비용 계산
  const qty = Number(document.getElementById(`qty-${idx}`)?.value || 0);
  const unitPrice = Number(document.getElementById(`unitPrice-${idx}`)?.value || 0);
  const asFee = qty * unitPrice;
  
  // 2. 자재비 계산
  const matQty = Number(document.getElementById(`matQty-${idx}`)?.value || 0);
  const matUnitPrice = Number(document.getElementById(`matUnitPrice-${idx}`)?.value || 0);
  const matCost = matQty * matUnitPrice;
  
  // 3. 출장비, 기타비용
  const travel = Number(document.getElementById(`travelCost-${idx}`)?.value || 0);
  const other = Number(document.getElementById(`otherCost-${idx}`)?.value || 0);
  
  // 4. 값 넣기
  const asFeeEl = document.getElementById(`asFee-${idx}`);
  if (asFeeEl) asFeeEl.value = asFee;
  
  const matCostEl = document.getElementById(`materialCost-${idx}`);
  if (matCostEl) matCostEl.value = matCost;
  
  // 5. 청구액 = AS + 출장 + 기타 (자재비 제외!)
  const subTotal = asFee + travel + other;
  const subTotalEl = document.getElementById(`itemSubtotal-${idx}`);
  if (subTotalEl) subTotalEl.textContent = subTotal.toLocaleString() + '원';
  
  // 6. 마진 = 청구액 - 자재비
  const margin = subTotal - matCost;
  const marginEl = document.getElementById(`itemMargin-${idx}`);
  if (marginEl) {
    marginEl.textContent = margin.toLocaleString() + '원';
    marginEl.className = margin >= 0 ? 'font-bold text-green-600' : 'font-bold text-red-600';
  }
  
  // 7. 전체 합계 계산
  calcGrandTotal();
}

function removeEquipmentItem(idx) {
  document.getElementById(`item-${idx}`)?.remove();
  calcGrandTotal();
}

// =====================================================
// AS비용 계산 (수량 × 단가)
// =====================================================
function calcAsFee(idx) {
  const qty = Number(document.getElementById(`qty-${idx}`)?.value || 1);
  const unitPrice = Number(document.getElementById(`unitPrice-${idx}`)?.value || 0);
  const asFee = qty * unitPrice;
  
  const asFeeEl = document.getElementById(`asFee-${idx}`);
  if (asFeeEl) asFeeEl.value = asFee;
  
  calcItemTotal(idx);
}

// =====================================================
// 자재비 계산 (수량 × 단가)
// =====================================================
function calcMaterialCost(idx) {
  const qty = Number(document.getElementById(`matQty-${idx}`)?.value || 0);
  const unitPrice = Number(document.getElementById(`matUnitPrice-${idx}`)?.value || 0);
  const materialCost = qty * unitPrice;
  
  const materialEl = document.getElementById(`materialCost-${idx}`);
  if (materialEl) materialEl.value = materialCost;
  
  calcItemTotal(idx);
}

// =====================================================
// 장비별 소계 계산
// =====================================================
function calcItemTotal(idx) {
  const asFee = Number(document.getElementById(`asFee-${idx}`)?.value || 0);
  const materialCost = Number(document.getElementById(`materialCost-${idx}`)?.value || 0);
  const travelCost = Number(document.getElementById(`travelCost-${idx}`)?.value || 0);
  const otherCost = Number(document.getElementById(`otherCost-${idx}`)?.value || 0);
  
  // 청구액 = AS비용 + 출장비 + 기타비용 (자재비는 원가이므로 제외)
  const subtotal = asFee + travelCost + otherCost;
  
  // 마진 = 청구액 - 자재비
  const margin = subtotal - materialCost;
  
  // 화면 표시
  const subtotalEl = document.getElementById(`itemSubtotal-${idx}`);
  if (subtotalEl) subtotalEl.textContent = subtotal.toLocaleString() + '원';
  
  const materialEl = document.getElementById(`itemMaterial-${idx}`);
  if (materialEl) materialEl.textContent = materialCost.toLocaleString() + '원';
  
  const marginEl = document.getElementById(`itemMargin-${idx}`);
  if (marginEl) {
    marginEl.textContent = margin.toLocaleString() + '원';
    marginEl.className = margin >= 0 ? 'text-green-600 text-lg' : 'text-red-600 text-lg';
  }
  
  // 기존 itemTotal (호환성)
  const itemTotalEl = document.getElementById(`itemTotal-${idx}`);
  if (itemTotalEl) itemTotalEl.textContent = subtotal.toLocaleString() + '원';
  
  calcGrandTotal();
}
// =====================================================
// 신규접수: 전체 합계 계산
// =====================================================
function calcGrandTotal() {
  let totalSubtotal = 0;  // 청구액 합계
  let totalMaterial = 0;  // 자재비 합계
  
  for (let i = 0; i < itemIndex; i++) {
    const itemEl = document.getElementById(`item-${i}`);
    if (!itemEl) continue;
    
    const asFee = Number(document.getElementById(`asFee-${i}`)?.value || 0);
    const materialCost = Number(document.getElementById(`materialCost-${i}`)?.value || 0);
    const travelCost = Number(document.getElementById(`travelCost-${i}`)?.value || 0);
    const otherCost = Number(document.getElementById(`otherCost-${i}`)?.value || 0);
    
    // 청구액 = AS + 출장 + 기타 (자재비 제외!)
    totalSubtotal += asFee + travelCost + otherCost;
    totalMaterial += materialCost;
  }
  
  // 세금계산서 발행 시 세액 추가
  const taxInvoice = document.getElementById('taxInvoiceSelect')?.value || '';
  const taxAmount = (taxInvoice === '발행') ? Math.round(totalSubtotal * 0.1) : 0;
  
  // 총 청구액 = 소계 + 세액
  const grandTotal = totalSubtotal + taxAmount;
  
  // 화면 표시
  const grandTotalEl = document.getElementById('grandTotal');
  if (grandTotalEl) {
    if (taxAmount > 0) {
      grandTotalEl.innerHTML = `${grandTotal.toLocaleString()}원 <span class="text-sm">(세액 ${taxAmount.toLocaleString()}원)</span>`;
    } else {
      grandTotalEl.textContent = grandTotal.toLocaleString() + '원';
    }
  }
}

async function submitNewAS() {
  const phone = document.getElementById('phoneInput').value.trim();
  if (!phone) return alert('연락처를 입력하세요.');

  const items = [];
  for (let i = 0; i < itemIndex; i++) {
    const symptomEl = document.getElementById(`symptom-${i}`);
    if (!symptomEl) continue;
    
    const symptom = symptomEl.value.trim();
    if (!symptom) {
      alert(`장비 #${i+1}의 고장증상을 입력하세요.`);
      return;
    }

    items.push({
      equipmentType: document.getElementById(`equipType-${i}`)?.value || '',
      brand: document.getElementById(`brand-${i}`)?.value || '',
      modelName: document.getElementById(`modelName-${i}`)?.value || '',
      serialNo: document.getElementById(`serialNo-${i}`)?.value || '',
      symptom,
      asFee: Number(document.getElementById(`asFee-${i}`)?.value || 0),
      materialCost: Number(document.getElementById(`materialCost-${i}`)?.value || 0),
      travelCost: Number(document.getElementById(`travelCost-${i}`)?.value || 0),
      otherCost: Number(document.getElementById(`otherCost-${i}`)?.value || 0)
    });
  }

  if (items.length === 0) return alert('최소 1개 이상의 장비를 입력하세요.');

  const data = {
    phone,
    centerName: document.getElementById('centerNameInput').value.trim(),
    customerName: document.getElementById('customerNameInput').value.trim(),
    customerType: document.getElementById('customerTypeSelect').value,
    address: document.getElementById('addressInput').value.trim(),
    channel: document.getElementById('channelSelect').value,
    technician: document.getElementById('technicianSelect').value,
    visitDate: document.getElementById('visitDateInput').value,
    priority: document.getElementById('prioritySelect').value,
    taxInvoice: document.getElementById('taxInvoiceSelect').value,
    paidAmount: Number(document.getElementById('paidAmountInput').value || 0),
    payMethod: document.getElementById('payMethodSelect').value,
    dueDate: document.getElementById('dueDateInput').value,
    items
  };

  try {
    const result = await callGAS('saveAS', {
      data: encodeURIComponent(JSON.stringify(data))
    });

    if (result.asNos) {
      // ★★★ 단건/다건 구분하여 메시지 출력 ★★★
      let message = `✅ 접수 완료!\n\n`;
      message += `접수번호: ${result.asNos.join(', ')}\n`;
      
      if (result.isMultiple && result.groupNo) {
        message += `묶음번호: ${result.groupNo}\n`;
        message += `총 ${result.count}건 묶음 접수`;
      } else {
        message += `총 1건 접수`;
      }
      
      alert(message);
      switchTab('home');

  } catch (err) {}
}

async function quickChangeStatus(asNo, newStatus, selectElement) {
  if (!newStatus) return;
  
  if (!confirm(`[${asNo}]\n\n"${newStatus}" 상태로 변경하시겠습니까?`)) {
    selectElement.value = '';
    return;
  }
  
  try {
    selectElement.disabled = true;
    selectElement.style.opacity = '0.5';
    
    const params = {
      action: 'quickUpdateStatus',
      data: encodeURIComponent(JSON.stringify({ 
        asNo: asNo, 
        status: newStatus 
      }))
    };
    
    const url = GAS_URL + '?' + Object.keys(params).map(k => k + '=' + params[k]).join('&');
    const response = await fetch(url);
    const result = await response.json();
    
    if (result.error) {
      throw new Error(result.message);
    }
    
    alert(`${asNo} → ${newStatus} 변경 완료`);
    
    // ✅ 페이지 새로고침
    location.reload();
    
  } catch (err) {
    console.error('상태 변경 오류:', err);
    alert('상태 변경 실패: ' + err.message);
    selectElement.value = '';
  } finally {
    selectElement.disabled = false;
    selectElement.style.opacity = '1';
  }
}

// ★★★ 사진 업로드 ★★★
async function uploadPhoto(asNo, photoType, inputEl) {
  const file = inputEl.files[0];
  if (!file) return;
  
  if (!file.type.startsWith('image/')) {
    alert('이미지 파일만 업로드 가능합니다.');
    inputEl.value = '';
    return;
  }
  
  if (file.size > 10 * 1024 * 1024) {
    alert('파일 크기는 10MB 이하만 가능합니다.');
    inputEl.value = '';
    return;
  }
  
  try {
    showLoading(true);
    
    // 파일을 base64로 변환
    const dataUrl = await fileToDataUrl(file);
    
    const payload = {
      asNo,
      photoType,
      dataUrl
    };
    
    await callGAS('uploadASPhoto', { payload: encodeURIComponent(JSON.stringify(payload)) });
    
    alert('✅ 사진 업로드 완료');
    inputEl.value = '';
    
    // 상세보기 새로고침
    closeModal();
    viewASDetail(asNo);
    
  } catch (err) {
    inputEl.value = '';
  }
}

// 파일을 DataURL로 변환
function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// 보고서 생성 (PC 직접 다운로드)
async function generateReport(asNo) {
  if (!confirm('작업완료 보고서(PDF)를 생성하시겠습니까?')) return;

  try {
    alert('PDF 생성 중... 잠시 기다려주세요.');
    
    // GAS_URL 정의 확인
    if (typeof GAS_URL === 'undefined') {
      throw new Error('GAS_URL 변수를 확인해주세요.');
    }
    
    const url = GAS_URL + '?action=generateCompletionReportPdf&asNo=' + encodeURIComponent(asNo);
    console.log('요청 URL:', url);
    
    const response = await fetch(url, {
      method: 'GET',
      mode: 'cors'
    });
    
    console.log('응답 상태:', response.status);
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }
    
    const result = await response.json();
    
    if (result.error) {
      throw new Error(result.message || '서버 에러');
    }
    
    if (result.pdfBase64) {
      // Base64 → Blob 변환
      const byteCharacters = atob(result.pdfBase64);
      const byteArray = new Uint8Array(byteCharacters.length);
      for (let i = 0; i < byteCharacters.length; i++) {
        byteArray[i] = byteCharacters.charCodeAt(i);
      }
      
      const blob = new Blob([byteArray], { type: 'application/pdf' });
      const downloadUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = downloadUrl;
      a.download = result.fileName || '작업완료보고서_' + asNo + '.pdf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(downloadUrl);
      
      alert('✅ PDF 다운로드 완료!');
    } else {
      throw new Error('pdfBase64 데이터가 없습니다.');
    }
    
  } catch (err) {
    console.error('PDF 오류:', err);
    alert('PDF 생성 실패: ' + (err.message || '알 수 없는 오류'));
  }
}

// =====================================================
// =====================================================
// 상세보기: 합계 계산 (자재비 제외!)
// =====================================================
function calculateTotal() {
  // 값 가져오기
  const asFeeEl = document.getElementById('edit_asFee');
  const materialCostEl = document.getElementById('edit_materialCost');
  const travelCostEl = document.getElementById('edit_travelCost');
  const otherCostEl = document.getElementById('edit_otherCost');
  const taxInvoiceEl = document.getElementById('edit_taxInvoice');
  
  // 요소가 없으면 종료 (모달이 아직 안 열림)
  if (!asFeeEl) {
    console.log('calculateTotal: 요소를 찾을 수 없음');
    return;
  }
  
  const asFee = Number(asFeeEl.value || 0);
  const materialCost = Number(materialCostEl?.value || 0);
  const travelCost = Number(travelCostEl?.value || 0);
  const otherCost = Number(otherCostEl?.value || 0);
  const taxInvoice = taxInvoiceEl ? taxInvoiceEl.value : '';
  
  console.log('calculateTotal 호출:', { asFee, materialCost, travelCost, otherCost, taxInvoice });
  
  // 청구액 = AS비용 + 출장비 + 기타 (자재비 제외!)
  const subTotal = asFee + travelCost + otherCost;
  
  // 세액 (발행 시 10%)
  const taxAmount = (taxInvoice === '발행') ? Math.round(subTotal * 0.1) : 0;
  
  // 총 청구액 = 소계 + 세액
  const totalWithTax = subTotal + taxAmount;
  
  // 마진 = 청구액 - 자재비
  const margin = totalWithTax - materialCost;
  
  // 미수금 (기존 입금액 고려)
  const paidAmountEl = document.getElementById('display_paidAmount');
  const paidAmount = paidAmountEl ? Number(paidAmountEl.dataset.value || 0) : 0;
  const receivable = Math.max(totalWithTax - paidAmount, 0);
  
  console.log('계산 결과:', { subTotal, taxAmount, totalWithTax, margin, receivable });
  
  // 화면 표시: 총 청구액
  const displayEl = document.getElementById('display_total');
  if (displayEl) {
    if (taxAmount > 0) {
      displayEl.innerHTML = `${totalWithTax.toLocaleString()}원 <span class="text-sm text-gray-500">(세액 ${taxAmount.toLocaleString()}원)</span>`;
    } else {
      displayEl.textContent = totalWithTax.toLocaleString() + '원';
    }
  }
  
  // 화면 표시: 자재비
  const materialDisplayEl = document.getElementById('display_material');
  if (materialDisplayEl) {
    materialDisplayEl.textContent = materialCost.toLocaleString() + '원';
  }
  
  // 화면 표시: 마진
  const marginEl = document.getElementById('display_margin');
  if (marginEl) {
    marginEl.textContent = margin.toLocaleString() + '원';
    marginEl.className = margin >= 0 
      ? 'text-xl font-black text-green-600' 
      : 'text-xl font-black text-red-600';
  }
  
  // 화면 표시: 미수금
  const receivableEl = document.getElementById('display_receivable');
  if (receivableEl) {
    receivableEl.textContent = receivable.toLocaleString() + '원';
  }
}

// =====================================================
// 추가접수: AS비용 계산 (수량 × 단가)
// =====================================================
function calcAddAsFee() {
  const qty = Number(document.getElementById('add_asQty')?.value || 1);
  const unitPrice = Number(document.getElementById('add_asUnitPrice')?.value || 0);
  const asFee = qty * unitPrice;
  
  const asFeeEl = document.getElementById('add_asFee');
  if (asFeeEl) asFeeEl.value = asFee;
  
  calcAddTotal();
}

// =====================================================
// 추가접수: 자재비 계산 (수량 × 단가)
// =====================================================
function calcAddMaterialCost() {
  const qty = Number(document.getElementById('add_matQty')?.value || 0);
  const unitPrice = Number(document.getElementById('add_matUnitPrice')?.value || 0);
  const materialCost = qty * unitPrice;
  
  const materialEl = document.getElementById('add_materialCost');
  if (materialEl) materialEl.value = materialCost;
  
  calcAddTotal();
}

// =====================================================
// 추가접수: 합계 계산
// =====================================================
function calcAddTotal() {
  const asFee = Number(document.getElementById('add_asFee')?.value || 0);
  const materialCost = Number(document.getElementById('add_materialCost')?.value || 0);
  const travelCost = Number(document.getElementById('add_travelCost')?.value || 0);
  const otherCost = Number(document.getElementById('add_otherCost')?.value || 0);
  
  // 청구액 = AS + 출장 + 기타 (자재비 제외!)
  const subtotal = asFee + travelCost + otherCost;
  
  // 마진 = 청구액 - 자재비
  const margin = subtotal - materialCost;
  
  // 화면 표시
  const subtotalEl = document.getElementById('add_subtotal');
  if (subtotalEl) subtotalEl.textContent = subtotal.toLocaleString() + '원';
  
  const marginEl = document.getElementById('add_margin');
  if (marginEl) {
    marginEl.textContent = margin.toLocaleString() + '원';
    marginEl.className = margin >= 0 ? 'font-bold text-green-600' : 'font-bold text-red-600';
  }
}

function closeAddItemModal() {
  const modal = document.getElementById('addItemModal');
  if (modal) modal.remove();
}

// =====================================================
async function submitAddItem(originalAsNo) {
  const equipmentType = document.getElementById('add_equipmentType')?.value?.trim();
  const symptom = document.getElementById('add_symptom')?.value?.trim();
  
  if (!equipmentType) {
    alert('기구종류를 입력하세요.');
    return;
  }
  if (!symptom) {
    alert('고장증상을 입력하세요.');
    return;
  }
  
  if (!confirm('추가 접수하시겠습니까?')) return;
  
  try {
    const data = {
      originalAsNo: originalAsNo,
      equipmentType: equipmentType,
      brand: document.getElementById('add_brand')?.value?.trim() || '',
      modelName: document.getElementById('add_modelName')?.value?.trim() || '',
      symptom: symptom,
      asFee: Number(document.getElementById('add_asFee')?.value || 0),
      materialCost: Number(document.getElementById('add_materialCost')?.value || 0),
      travelCost: Number(document.getElementById('add_travelCost')?.value || 0),
      otherCost: Number(document.getElementById('add_otherCost')?.value || 0),
      memo: document.getElementById('add_memo')?.value?.trim() || ''
    };
    
    console.log('추가접수 데이터:', data);
    
    const result = await callGAS('addToExistingAS', { data: JSON.stringify(data) });
    
    if (result.error) {
      throw new Error(result.message);
    }
    
    alert('✅ ' + result.message);
    closeAddItemModal();
    closeModal();
    location.reload();
    
  } catch (err) {
    console.error('추가 접수 오류:', err);
    alert('추가 접수 실패: ' + (err.message || '알 수 없는 오류'));
  }

              <div class="text-xs text-gray-600">기입금</div>
              <div class="font-bold text-lg text-green-600">${(groupInfo.paidAmount || 0).toLocaleString()}원</div>
            </div>
            <div class="bg-red-100 p-3 rounded-lg text-center">
              <div class="text-xs text-gray-600">미수금</div>
              <div class="font-bold text-lg text-red-600">${(groupInfo.receivable || 0).toLocaleString()}원</div>
            </div>
          </div>

          <div class="bg-gray-50 p-4 rounded-lg mb-4">
            <h4 class="font-bold mb-3">입금 정보</h4>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="label">입금액 *</label>
                <input type="number" id="groupPayAmount" value="${groupInfo.receivable || 0}" class="input text-lg font-bold">
              </div>
              <div>
                <label class="label">입금일</label>
                <input type="date" id="groupPayDate" value="${new Date().toISOString().slice(0,10)}" class="input">
              </div>
              <div>
                <label class="label">결제수단</label>
                <select id="groupPayMethod" class="input">
                  ${(MASTER_DATA?.payMethods || ['현금','계좌이체','카드']).map(m => `<option>${m}</option>`).join('')}
                </select>
              </div>
              <div>
                <label class="label">비고</label>
                <input type="text" id="groupPayNote" class="input" placeholder="비고 (선택)">
              </div>
            </div>
          </div>

          <div class="flex gap-3">
            <button onclick="submitGroupPayment('${groupNo}')" class="btn btn-success flex-1 py-4 text-xl font-bold">
              💰 입금 처리
            </button>
            <button onclick="closeGroupPayModal()" class="btn btn-secondary py-4 px-6">취소</button>
          </div>
        </div>
      </div>
    `;
    
    document.body.insertAdjacentHTML('beforeend', modalHtml);
    
    document.getElementById('groupPayModal').addEventListener('click', function(e) {
      if (e.target === this) closeGroupPayModal();
    });
    
  } catch (err) {
    showLoading(false);
    alert('묶음 정보 조회 실패: ' + err.message);
  }
}

function closeGroupPayModal() {
  document.getElementById('groupPayModal')?.remove();
}

async function submitGroupPayment(groupNo) {
  const amount = Number(document.getElementById('groupPayAmount')?.value || 0);
  if (amount <= 0) {
    alert('입금액을 입력하세요.');
    return;
  }

  const data = {
    groupNo: groupNo,
    amount: amount,
    payDate: document.getElementById('groupPayDate')?.value || new Date().toISOString().slice(0,10),
    payMethod: document.getElementById('groupPayMethod')?.value || '현금',
    note: document.getElementById('groupPayNote')?.value || '묶음입금'
  };

  try {
    await callGAS('addGroupPayment', { data: encodeURIComponent(JSON.stringify(data)) });
    alert('✅ 묶음 입금 완료!');
    closeGroupPayModal();
    loadReceivableData();
  } catch (err) {
    alert('입금 처리 실패: ' + err.message);
  }
}
