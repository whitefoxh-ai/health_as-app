<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>헬스기구 AS 관리시스템</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
    .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }

</head>

<body class="bg-gray-50 min-h-screen">

<!-- 로딩 오버레이 -->
<div id="loadingOverlay" class="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center" style="display:none;">
  <div class="bg-white p-8 rounded-lg shadow-2xl text-center">
    <div class="loading-spinner mx-auto mb-4"></div>
    <p class="text-gray-700 font-bold text-lg">처리 중...</p>
  </div>
</div>

<!-- 메인 컨테이너 -->
<div class="max-w-7xl mx-auto p-4">
  
  <!-- 헤더 -->
  <header class="card bg-gradient-to-r from-blue-600 to-blue-800 text-white mb-6">
    <h1 class="text-3xl font-black mb-2">⚙️ 헬스기구 AS 관리시스템</h1>
    <p id="todayDate" class="text-sm opacity-90"></p>
  </header>

  <!-- 대시보드 요약 -->
  <div id="dashboardSummary" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"></div>

  <!-- 탭 메뉴 -->
  <div class="bg-white rounded-lg shadow-md mb-6 overflow-x-auto">
    <div class="flex border-b">
      <button class="tab-btn tab-active px-6 py-3 font-medium whitespace-nowrap" data-tab="reception">📝 신규접수</button>
      <button class="tab-btn px-6 py-3 font-medium whitespace-nowrap" data-tab="list">📋 AS목록</button>
      <button class="tab-btn px-6 py-3 font-medium whitespace-nowrap" data-tab="receivable">💰 미수금</button>
      <button class="tab-btn px-6 py-3 font-medium whitespace-nowrap" data-tab="monthly">📊 월마감</button>
    </div>
  </div>

  <!-- 탭 컨텐츠 -->
  <div id="tab-reception" class="tab-content"></div>
  <div id="tab-list" class="tab-content" style="display:none;"></div>
  <div id="tab-receivable" class="tab-content" style="display:none;"></div>
  <div id="tab-monthly" class="tab-content" style="display:none;"></div>

</div>

<script>

// ========== 설정 (여기만 수정) ==========
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzYYJaYo-nayr52WUVP01C7j4fE0S_RcXEuHk1Pec9Xc6OlPKoF--l9cc4cclEaCYI/exec';
// ========================================

let MASTER_DATA = null;
let CACHE_TIMESTAMP = 0;
let CURRENT_ITEMS = []; // 다건 접수용

// =====================================================
// GET 전용 API 호출 (POST 완전 제거)
// =====================================================
async function callGAS(action, params = {}) {
  try {
    showLoading(true);

    if (action === 'getInitData') {
      const now = Date.now();
      const cached = localStorage.getItem('cachedInitData');
      if (cached && CACHE_TIMESTAMP && (now - CACHE_TIMESTAMP < 300000)) {
        const data = JSON.parse(cached);
        MASTER_DATA = data.master;
        showLoading(false);
        return data;
      }
    }

    const urlParams = new URLSearchParams({ action, ...params });
    const url = `${GAS_URL}?${urlParams.toString()}`;

    const response = await fetch(url, {
      method: 'GET',
      cache: 'no-store',
      headers: { 'Accept': 'application/json' }
    });

    if (!response.ok) {
      throw new Error(`서버 오류 (HTTP ${response.status})`);
    }

    const data = await response.json();

    if (data.error) {
      throw new Error(data.message || '알 수 없는 오류');
    }

    if (action === 'getInitData') {
      localStorage.setItem('cachedInitData', JSON.stringify(data));
      CACHE_TIMESTAMP = Date.now();
      MASTER_DATA = data.master;
    }

    if (['saveAS', 'saveASUpdate', 'deleteAS', 'addPayment', 'addGroupPayment'].includes(action)) {
      localStorage.removeItem('cachedInitData');
      CACHE_TIMESTAMP = 0;
    }

    showLoading(false);
    return data;

  } catch (err) {
    showLoading(false);
    console.error('API 오류:', err);
    alert('⚠️ 네트워크 오류\n\n' + err.message + '\n\n인터넷 연결 확인 후 다시 시도해주세요.');
    throw err;
  }
}

// =====================================================
// 초기화
// =====================================================
async function initApp() {
  try {
    const today = new Date();
    document.getElementById('todayDate').textContent = 
      today.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });

    const initData = await callGAS('getInitData');
    MASTER_DATA = initData.master;
    
    renderDashboard(initData.dashboard);
    renderReceptionTab();

  } catch (err) {
    alert('시스템 초기화 실패\n새로고침(F5) 해주세요.\n\n' + err.message);
  }
}

function renderDashboard(dash) {
  const container = document.getElementById('dashboardSummary');
  container.innerHTML = `
    <div class="card text-center bg-blue-50 hover:shadow-lg transition">
      <div class="text-4xl font-black text-blue-600 mb-1">${dash.todayCount || 0}</div>
      <div class="text-xs text-gray-600">오늘 접수</div>
    </div>
    <div class="card text-center bg-green-50 hover:shadow-lg transition">
      <div class="text-3xl font-black text-green-600 mb-1">${(dash.monthSales || 0).toLocaleString()}<span class="text-lg">원</span></div>
      <div class="text-xs text-gray-600">이번달 매출</div>
    </div>
    <div class="card text-center bg-orange-50 hover:shadow-lg transition">
      <div class="text-3xl font-black text-orange-600 mb-1">${(dash.totalReceivable || 0).toLocaleString()}<span class="text-lg">원</span></div>
      <div class="text-xs text-gray-600">총 미수금</div>
    </div>
    <div class="card text-center bg-purple-50 hover:shadow-lg transition">
      <div class="text-4xl font-black text-purple-600 mb-1">${dash.openCount || 0}</div>
      <div class="text-xs text-gray-600">진행중</div>
    </div>
  `;
}

// =====================================================
// 신규접수 탭 (다건 + 고객조회 + 자재비 계산 포함)
// =====================================================
function renderReceptionTab() {
  const container = document.getElementById('tab-reception');
  container.innerHTML = `
    <div class="card">
      <h2 class="text-2xl font-black mb-4 text-gray-800 flex items-center gap-2">
        📝 신규 AS 접수
        <button onclick="resetReceptionForm()" class="btn btn-secondary text-sm ml-auto">전체 초기화</button>
      </h2>
      
      <!-- 고객 조회 -->
      <div class="bg-blue-50 p-4 rounded-lg mb-4">
        <label class="label">🔍 고객 조회 (연락처 또는 센터명)</label>
        <div class="flex gap-2">
          <input type="text" id="customerSearchInput" placeholder="연락처 또는 센터명 입력" class="input flex-1">
          <button onclick="searchCustomer()" class="btn btn-primary">조회</button>
        </div>
        <div id="customerSearchResult" class="mt-3 text-sm"></div>
      </div>

      <!-- 고객 정보 -->
      <div class="grid md:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="label">연락처 (필수)</label>
          <input type="text" id="phoneInput" placeholder="010-0000-0000" class="input">
        </div>
        <div>
          <label class="label">센터명</label>
          <input type="text" id="centerNameInput" placeholder="센터명" class="input">
        </div>
        <div>
          <label class="label">고객명</label>
          <input type="text" id="customerNameInput" placeholder="고객명" class="input">
        </div>
        <div>
          <label class="label">고객 유형</label>
          <select id="customerTypeSelect" class="input">
            ${(MASTER_DATA?.customerTypes || ['헬스장']).map(t => `<option>${t}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="label">주소</label>
          <input type="text" id="addressInput" placeholder="주소" class="input">
        </div>
        <div>
          <label class="label">접수 채널</label>
          <select id="channelSelect" class="input">
            ${(MASTER_DATA?.channels || ['전화']).map(c => `<option>${c}</option>`).join('')}
          </select>
        </div>
      </div>

      <!-- 공통 정보 -->
      <div class="grid md:grid-cols-3 gap-4 mb-4 bg-gray-50 p-4 rounded-lg">
        <div>
          <label class="label">담당기사</label>
          <select id="technicianSelect" class="input">
            <option value="">선택 안함</option>
            ${(MASTER_DATA?.technicians || []).map(t => `<option>${t}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="label">방문예정일</label>
          <input type="date" id="visitDateInput" class="input">
        </div>
        <div>
          <label class="label">긴급도</label>
          <select id="prioritySelect" class="input">
            ${(MASTER_DATA?.priorities || ['일반']).map(p => `<option>${p}</option>`).join('')}
          </select>
        </div>
      </div>

      <!-- 장비별 다건 접수 -->
      <div class="bg-yellow-50 p-4 rounded-lg mb-4">
        <div class="flex justify-between items-center mb-3">
          <h3 class="font-black text-lg">🔧 장비별 접수 내역</h3>
          <button onclick="addEquipmentItem()" class="btn btn-success text-sm">+ 장비 추가</button>
        </div>
        <div id="equipmentItemsContainer"></div>
      </div>

      <!-- 선입금 -->
      <div class="grid md:grid-cols-2 gap-4 mb-4 bg-green-50 p-4 rounded-lg">
        <div>
          <label class="label">선입금 금액</label>
          <input type="number" id="paidAmountInput" placeholder="0" class="input">
        </div>
        <div>
          <label class="label">결제수단</label>
          <select id="payMethodSelect" class="input">
            ${(MASTER_DATA?.payMethods || ['현금']).map(m => `<option>${m}</option>`).join('')}
          </select>
        </div>
      </div>

      <!-- 접수 버튼 -->
      <div class="flex gap-3">
        <button onclick="submitNewAS()" class="btn btn-primary flex-1 text-lg py-4">✅ 접수 완료</button>
      </div>
    </div>
  `;

  // 초기 장비 1개 추가
  addEquipmentItem();
}

let itemIndex = 0;
function addEquipmentItem() {
  const container = document.getElementById('equipmentItemsContainer');
  const idx = itemIndex++;
  
  const itemHtml = `
    <div class="border-2 border-gray-300 rounded-lg p-4 mb-3 bg-white" id="item-${idx}">
      <div class="flex justify-between items-center mb-3">
        <strong class="text-blue-600">장비 #${idx + 1}</strong>
        ${idx > 0 ? `<button onclick="removeEquipmentItem(${idx})" class="text-red-600 font-bold text-sm">✕ 삭제</button>` : ''}
      </div>
      
      <div class="grid md:grid-cols-2 gap-3 mb-3">
        <div>
          <label class="label">기구종류 (필수)</label>
          <select id="equipType-${idx}" class="input">
            ${(MASTER_DATA?.equipmentTypes || ['런닝머신']).map(e => `<option>${e}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="label">브랜드</label>
          <select id="brand-${idx}" class="input">
            ${(MASTER_DATA?.brands || ['직접입력']).map(b => `<option>${b}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="label">모델명</label>
          <input type="text" id="modelName-${idx}" class="input" placeholder="모델명">
        </div>
        <div>
          <label class="label">시리얼번호</label>
          <input type="text" id="serialNo-${idx}" class="input" placeholder="시리얼번호">
        </div>
      </div>

      <div class="mb-3">
        <label class="label">고장증상 (필수)</label>
        <textarea id="symptom-${idx}" class="input" rows="2" placeholder="고장증상 상세 입력"></textarea>
      </div>

      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
        <div>
          <label class="label">AS비용</label>
          <input type="number" id="asFee-${idx}" class="input" placeholder="0" oninput="calcItemTotal(${idx})">
        </div>
        <div>
          <label class="label">자재비</label>
          <input type="number" id="materialCost-${idx}" class="input" placeholder="0" oninput="calcItemTotal(${idx})">
        </div>
        <div>
          <label class="label">출장비</label>
          <input type="number" id="travelCost-${idx}" class="input" placeholder="0" oninput="calcItemTotal(${idx})">
        </div>
        <div>
          <label class="label">기타비용</label>
          <input type="number" id="otherCost-${idx}" class="input" placeholder="0" oninput="calcItemTotal(${idx})">
        </div>
      </div>

      <div class="bg-gray-100 p-3 rounded text-right">
        <strong class="text-lg">장비별 총액: <span id="itemTotal-${idx}" class="text-blue-600">0원</span></strong>
      </div>
    </div>
  `;
  
  container.insertAdjacentHTML('beforeend', itemHtml);
}

function removeEquipmentItem(idx) {
  document.getElementById(`item-${idx}`)?.remove();
}

function calcItemTotal(idx) {
  const asFee = Number(document.getElementById(`asFee-${idx}`)?.value || 0);
  const materialCost = Number(document.getElementById(`materialCost-${idx}`)?.value || 0);
  const travelCost = Number(document.getElementById(`travelCost-${idx}`)?.value || 0);
  const otherCost = Number(document.getElementById(`otherCost-${idx}`)?.value || 0);
  const total = asFee + materialCost + travelCost + otherCost;
  
  const totalEl = document.getElementById(`itemTotal-${idx}`);
  if (totalEl) totalEl.textContent = total.toLocaleString() + '원';
}

async function searchCustomer() {
  const query = document.getElementById('customerSearchInput').value.trim();
  if (!query) return alert('조회할 연락처 또는 센터명을 입력하세요.');

  const result = await callGAS('lookupCustomer', { q: query });
  const container = document.getElementById('customerSearchResult');

  if (!result || !result.customer) {
    container.innerHTML = '<p class="text-gray-500">조회 결과가 없습니다.</p>';
    return;
  }

  const c = result.customer;
  document.getElementById('phoneInput').value = c.phone || '';
  document.getElementById('centerNameInput').value = c.centerName || '';
  document.getElementById('customerNameInput').value = c.customerName || '';
  document.getElementById('addressInput').value = c.address || '';

  container.innerHTML = `
    <div class="bg-white p-3 rounded border border-green-500">
      <p class="text-green-700 font-bold mb-2">✅ 고객 정보 자동 입력됨</p>
      <p class="text-sm text-gray-700">${c.centerName} | ${c.customerName} | ${c.phone}</p>
      ${result.histories?.length > 0 ? `
        <p class="text-xs text-gray-500 mt-2">최근 AS: ${result.histories.length}건</p>
      ` : ''}
    </div>
  `;
}

async function submitNewAS() {
  const phone = document.getElementById('phoneInput').value.trim();
  if (!phone) return alert('연락처를 입력하세요.');

  const items = [];
  for (let i = 0; i < itemIndex; i++) {
    const symptomEl = document.getElementById(`symptom-${i}`);
    if (!symptomEl) continue;
    
    const symptom = symptomEl.value.trim();
    if (!symptom) {
      alert(`장비 #${i+1}의 고장증상을 입력하세요.`);
      return;
    }

    items.push({
      equipmentType: document.getElementById(`equipType-${i}`)?.value || '',
      brand: document.getElementById(`brand-${i}`)?.value || '',
      modelName: document.getElementById(`modelName-${i}`)?.value || '',
      serialNo: document.getElementById(`serialNo-${i}`)?.value || '',
      symptom,
      asFee: Number(document.getElementById(`asFee-${i}`)?.value || 0),
      materialCost: Number(document.getElementById(`materialCost-${i}`)?.value || 0),
      travelCost: Number(document.getElementById(`travelCost-${i}`)?.value || 0),
      otherCost: Number(document.getElementById(`otherCost-${i}`)?.value || 0)
    });
  }

  if (items.length === 0) return alert('최소 1개 이상의 장비를 입력하세요.');

  const data = {
    phone,
    centerName: document.getElementById('centerNameInput').value.trim(),
    customerName: document.getElementById('customerNameInput').value.trim(),
    customerType: document.getElementById('customerTypeSelect').value,
    address: document.getElementById('addressInput').value.trim(),
    channel: document.getElementById('channelSelect').value,
    technician: document.getElementById('technicianSelect').value,
    visitDate: document.getElementById('visitDateInput').value,
    priority: document.getElementById('prioritySelect').value,
    paidAmount: Number(document.getElementById('paidAmountInput').value || 0),
    payMethod: document.getElementById('payMethodSelect').value,
    items
  };

  try {
    const result = await callGAS('saveAS', {
      data: encodeURIComponent(JSON.stringify(data))
    });

    if (result.asNos) {
      alert(`✅ 접수 완료!\n\n총 ${result.count}건 접수\n접수번호: ${result.asNos.join(', ')}\n묶음번호: ${result.groupNo}`);
      resetReceptionForm();
      
      const dash = await callGAS('refreshDashboard');
      renderDashboard(dash);
    }
  } catch (err) {
    // 에러는 callGAS에서 처리
  }
}

function resetReceptionForm() {
  document.getElementById('customerSearchInput').value = '';
  document.getElementById('customerSearchResult').innerHTML = '';
  document.getElementById('phoneInput').value = '';
  document.getElementById('centerNameInput').value = '';
  document.getElementById('customerNameInput').value = '';
  document.getElementById('addressInput').value = '';
  document.getElementById('visitDateInput').value = '';
  document.getElementById('paidAmountInput').value = '';
  
  document.getElementById('equipmentItemsContainer').innerHTML = '';
  itemIndex = 0;
  addEquipmentItem();
}

// =====================================================
// AS 목록 탭
// =====================================================
function renderListTab() {
  const container = document.getElementById('tab-list');
  container.innerHTML = `
    <div class="card">
      <h2 class="text-2xl font-black mb-4 text-gray-800">📋 AS 목록</h2>
      
      <div class="grid md:grid-cols-3 gap-3 mb-4">
        <input type="text" id="listSearchInput" placeholder="검색 (접수번호, 고객명, 센터명...)" class="input">
        <select id="listStatusFilter" class="input">
          <option value="">전체 상태</option>
          ${(MASTER_DATA?.statuses || []).map(s => `<option>${s}</option>`).join('')}
        </select>
        <button onclick="loadASList()" class="btn btn-primary">🔍 검색</button>
      </div>

      <div id="asListContainer" class="space-y-3"></div>
    </div>
  `;
  
  loadASList();
}

async function loadASList() {
  const keyword = document.getElementById('listSearchInput')?.value || '';
  const status = document.getElementById('listStatusFilter')?.value || '';
  const container = document.getElementById('asListContainer');
  
  container.innerHTML = '<div class="text-center py-8 text-gray-500"><div class="loading-spinner mx-auto mb-3"></div>로딩 중...</div>';

  try {
    const list = await callGAS('getASList', { keyword, status });

    if (!list || list.length === 0) {
      container.innerHTML = '<div class="text-center py-12 text-gray-500 text-lg">📭 검색 결과가 없습니다.</div>';
      return;
    }

    container.innerHTML = list.slice(0, 50).map(item => `
      <div class="border-2 rounded-lg p-4 hover:bg-blue-50 hover:border-blue-400 cursor-pointer transition" onclick="viewASDetail('${item.asNo}')">
        <div class="flex justify-between items-start mb-2">
          <div>
            <span class="font-black text-blue-600 text-lg">${item.asNo}</span>
            ${item.groupNo ? `<span class="text-xs bg-purple-100 text-purple-700 px-2 py-1 rounded ml-2 font-bold">${item.groupSeq}/${item.groupCount}</span>` : ''}
          </div>
          <span class="text-xs font-bold px-3 py-1 rounded ${getStatusColor(item.status)}">${item.status}</span>
        </div>
        <div class="text-sm text-gray-700 mb-2 font-medium">
          <strong class="text-base">${item.centerName || item.customerName}</strong> | ${item.phone}
        </div>
        <div class="text-sm text-gray-600 mb-2">
          ${item.equipmentType} - ${item.symptom}
        </div>
        <div class="text-xs text-gray-500 flex justify-between items-center pt-2 border-t">
          <span>${item.receivedAt}</span>
          <span class="font-bold text-base ${item.receivable > 0 ? 'text-red-600' : 'text-green-600'}">

function getStatusColor(status) {
  const colors = {
    '접수': 'bg-blue-100 text-blue-700',
    '방문예정': 'bg-yellow-100 text-yellow-700',
    '부품주문': 'bg-orange-100 text-orange-700',
    '처리중': 'bg-purple-100 text-purple-700',
    '완료': 'bg-green-100 text-green-700',
    '취소': 'bg-gray-100 text-gray-700',
    '보류': 'bg-red-100 text-red-700'
  };
  return colors[status] || 'bg-gray-100 text-gray-700';
}

// =====================================================
// 공통 유틸리티
// =====================================================
function showLoading(show) {
  document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
}

function closeModal(event) {
  if (event) {
    const overlay = event.target.closest('.modal-overlay');
    if (overlay) overlay.remove();
  } else {
    document.querySelector('.modal-overlay')?.remove();
  }
}

// 탭 전환
document.addEventListener('click', (e) => {
  if (e.target.classList.contains('tab-btn')) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
    e.target.classList.add('tab-active');
    
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    const targetTab = document.getElementById('tab-' + e.target.dataset.tab);
    if (targetTab) targetTab.style.display = 'block';
    
    // 탭별 렌더링
    if (e.target.dataset.tab === 'reception') renderReceptionTab();
    if (e.target.dataset.tab === 'list') renderListTab();
    if (e.target.dataset.tab === 'receivable') renderReceivableTab();
    if (e.target.dataset.tab === 'monthly') renderMonthlyTab();
  }
});

// 앱 시작
window.addEventListener('DOMContentLoaded', initApp);
