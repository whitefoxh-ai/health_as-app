<!DOCTYPE html>
<html lang="ko">
<head>

  <script src="https://cdn.tailwindcss.com"></script>

    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: #6b7280; color: white; }
    .btn-secondary:hover { background: #4b5563; }
    .btn-danger { background: #dc2626; color: white; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-success { background: #16a34a; color: white; }

      background: white;
      border-radius: 1rem;

      width: 100%;

      overflow-y: auto;

<body class="bg-gray-100 min-h-screen">

<!-- 로딩 오버레이 -->
<div id="loadingOverlay" class="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center" style="display:none;">

</div>

<!-- 메인 컨테이너 -->
<div class="max-w-7xl mx-auto p-4">
  
  <!-- 헤더 -->
  <header class="card bg-gradient-to-r from-blue-600 to-blue-800 text-white mb-6">
    <h1 class="text-3xl font-black mb-2">⚙️ 헬스기구 AS 관리시스템</h1>
    <p id="todayDate" class="text-sm opacity-90"></p>
  </header>

  <!-- 탭 메뉴 -->

      <button class="tab-btn px-6 py-4 font-medium whitespace-nowrap" data-tab="reception">📝 신규접수</button>
      <button class="tab-btn px-6 py-4 font-medium whitespace-nowrap" data-tab="list">📋 AS목록</button>
      <button class="tab-btn px-6 py-4 font-medium whitespace-nowrap" data-tab="receivable">💰 미수금</button>
      <button class="tab-btn px-6 py-4 font-medium whitespace-nowrap" data-tab="monthly">📊 월마감</button>
    </div>
  </div>

  <!-- 탭 컨텐츠 -->
  <div id="tab-home" class="tab-content"></div>
  <div id="tab-reception" class="tab-content" style="display:none;"></div>
  <div id="tab-list" class="tab-content" style="display:none;"></div>
  <div id="tab-receivable" class="tab-content" style="display:none;"></div>
  <div id="tab-monthly" class="tab-content" style="display:none;"></div>

</div>

<script>

// ========== 설정 (여기만 수정) ==========
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzYYJaYo-nayr52WUVP01C7j4fE0S_RcXEuHk1Pec9Xc6OlPKoF--l9cc4cclEaCYI/exec';
// ========================================

let MASTER_DATA = null;
let CACHE_TIMESTAMP = 0;
let itemIndex = 0;

// =====================================================
// GET 전용 API 호출
// =====================================================
async function callGAS(action, params = {}) {
  try {
    showLoading(true);

    if (action === 'getInitData') {
      const now = Date.now();
      const cached = localStorage.getItem('cachedInitData');
      if (cached && CACHE_TIMESTAMP && (now - CACHE_TIMESTAMP < 300000)) {
        const data = JSON.parse(cached);
        MASTER_DATA = data.master;
        showLoading(false);
        return data;
      }
    }

    const urlParams = new URLSearchParams({ action, ...params });
    const url = `${GAS_URL}?${urlParams.toString()}`;

    const response = await fetch(url, {
      method: 'GET',
      cache: 'no-store',
      headers: { 'Accept': 'application/json' }
    });

    if (!response.ok) throw new Error(`서버 오류 (HTTP ${response.status})`);

    const data = await response.json();
    if (data.error) throw new Error(data.message || '알 수 없는 오류');

    if (action === 'getInitData') {
      localStorage.setItem('cachedInitData', JSON.stringify(data));
      CACHE_TIMESTAMP = Date.now();
      MASTER_DATA = data.master;
    }

    if (['saveAS', 'saveASUpdate', 'deleteAS', 'addPayment', 'addGroupPayment'].includes(action)) {
      localStorage.removeItem('cachedInitData');
      CACHE_TIMESTAMP = 0;
    }

    showLoading(false);
    return data;

  } catch (err) {
    showLoading(false);
    console.error('API 오류:', err);
    alert('⚠️ 오류 발생\n\n' + err.message);
    throw err;
  }
}

// =====================================================
// 초기화
// =====================================================
async function initApp() {
  try {
    const today = new Date();
    document.getElementById('todayDate').textContent = 
      today.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });

    const initData = await callGAS('getInitData');
    MASTER_DATA = initData.master;
    
    renderHomeTab(initData.dashboard);

  } catch (err) {
    alert('시스템 초기화 실패\n새로고침(F5) 해주세요.');
  }
}

// =====================================================
// 홈화면
// =====================================================
function renderHomeTab(dash) {
  const container = document.getElementById('tab-home');
  container.innerHTML = `
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
      <div class="card text-center bg-blue-50 hover:shadow-lg transition cursor-pointer" onclick="switchTab('reception')">
        <div class="text-4xl font-black text-blue-600 mb-1">${dash?.todayCount || 0}</div>
        <div class="text-sm text-gray-600">오늘 접수</div>
      </div>
      <div class="card text-center bg-green-50 hover:shadow-lg transition">
        <div class="text-2xl font-black text-green-600 mb-1">${(dash?.monthSales || 0).toLocaleString()}<span class="text-base">원</span></div>
        <div class="text-sm text-gray-600">이번달 매출</div>
      </div>
      <div class="card text-center bg-orange-50 hover:shadow-lg transition cursor-pointer" onclick="switchTab('receivable')">
        <div class="text-2xl font-black text-orange-600 mb-1">${(dash?.totalReceivable || 0).toLocaleString()}<span class="text-base">원</span></div>
        <div class="text-sm text-gray-600">총 미수금</div>
      </div>
      <div class="card text-center bg-purple-50 hover:shadow-lg transition cursor-pointer" onclick="switchTab('list')">
        <div class="text-4xl font-black text-purple-600 mb-1">${dash?.openCount || 0}</div>
        <div class="text-sm text-gray-600">진행중</div>
      </div>
    </div>

    <div class="card">
      <h3 class="text-xl font-black text-gray-800 mb-4">📅 오늘 방문 예정 (${dash?.todayVisitCount || 0}건)</h3>
      ${dash?.todaySchedule?.length > 0 ? `
        <div class="space-y-3">
          ${dash.todaySchedule.map(item => `
            <div class="border-2 rounded-lg p-4 ${item.priority === '긴급' ? 'border-red-400 bg-red-50' : 'border-gray-200'} hover:shadow-md cursor-pointer" onclick="viewASDetail('${item.asNo}')">
              <div class="flex justify-between items-start mb-2">
                <span class="font-bold text-blue-600">${item.asNo}</span>
                <span class="text-sm font-bold px-2 py-1 rounded ${getStatusColor(item.status)}">${item.status}</span>
              </div>
              <div class="text-sm font-medium">${item.centerName || item.customerName}</div>
              <div class="text-sm text-gray-600">${item.equipmentType} - ${item.symptom}</div>
            </div>
          `).join('')}
        </div>
      ` : '<p class="text-gray-500 text-center py-8">오늘 방문 예정 건이 없습니다.</p>'}
    </div>

    <div class="grid md:grid-cols-4 gap-4">
      <button onclick="switchTab('reception')" class="card bg-blue-600 text-white text-center hover:bg-blue-700">
        <div class="text-3xl mb-2">📝</div>
        <div class="font-bold">신규 접수</div>
      </button>
      <button onclick="switchTab('list')" class="card bg-green-600 text-white text-center hover:bg-green-700">
        <div class="text-3xl mb-2">📋</div>
        <div class="font-bold">AS 목록</div>
      </button>
      <button onclick="switchTab('receivable')" class="card bg-orange-600 text-white text-center hover:bg-orange-700">
        <div class="text-3xl mb-2">💰</div>
        <div class="font-bold">미수금</div>
      </button>
      <button onclick="switchTab('monthly')" class="card bg-purple-600 text-white text-center hover:bg-purple-700">
        <div class="text-3xl mb-2">📊</div>
        <div class="font-bold">월마감</div>
      </button>
    </div>
  `;
}

function switchTab(tabName) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
  document.querySelector(`[data-tab="${tabName}"]`)?.classList.add('tab-active');
  
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  document.getElementById('tab-' + tabName).style.display = 'block';
  
  if (tabName === 'home') loadHomeTab();
  if (tabName === 'reception') renderReceptionTab();
  if (tabName === 'list') renderListTab();
  if (tabName === 'receivable') renderReceivableTab();
  if (tabName === 'monthly') renderMonthlyTab();
}

async function loadHomeTab() {
  const dash = await callGAS('refreshDashboard');
  renderHomeTab(dash);
}

// =====================================================
// 신규접수 (부가세 계산 포함)
// =====================================================
function renderReceptionTab() {
  itemIndex = 0;
  
  const container = document.getElementById('tab-reception');
  container.innerHTML = `
    <div class="card">
      <h2 class="text-2xl font-black mb-4 text-gray-800 flex items-center gap-2">
        📝 신규 AS 접수
        <button onclick="renderReceptionTab()" class="btn btn-secondary text-sm ml-auto">전체 초기화</button>
      </h2>
      
      <!-- 고객 조회 -->
      <div class="bg-blue-50 p-4 rounded-lg mb-4">
        <label class="label">🔍 고객 조회</label>
        <div class="flex gap-2">
          <input type="text" id="customerSearchInput" placeholder="연락처 또는 센터명" class="input flex-1">
          <button onclick="searchCustomer()" class="btn btn-primary">조회</button>
        </div>
        <div id="customerSearchResult" class="mt-3"></div>
      </div>

      <!-- 고객 정보 -->
      <div class="grid md:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="label">연락처 (필수) *</label>
          <input type="text" id="phoneInput" placeholder="010-0000-0000" class="input">
        </div>
        <div>
          <label class="label">센터명</label>
          <input type="text" id="centerNameInput" class="input">
        </div>
        <div>
          <label class="label">고객명</label>
          <input type="text" id="customerNameInput" class="input">
        </div>
        <div>
          <label class="label">고객 유형</label>
          <select id="customerTypeSelect" class="input">
            ${(MASTER_DATA?.customerTypes || ['헬스장']).map(t => `<option>${t}</option>`).join('')}
          </select>
        </div>
        <div class="md:col-span-2">
          <label class="label">주소</label>
          <input type="text" id="addressInput" class="input">
        </div>
      </div>

      <!-- 공통 정보 -->
      <div class="grid md:grid-cols-4 gap-4 mb-4 bg-gray-50 p-4 rounded-lg">
        <div>
          <label class="label">접수 채널</label>
          <select id="channelSelect" class="input">
            ${(MASTER_DATA?.channels || ['전화']).map(c => `<option>${c}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="label">담당기사</label>
          <select id="technicianSelect" class="input">
            <option value="">선택 안함</option>
            ${(MASTER_DATA?.technicians || []).map(t => `<option>${t}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="label">방문예정일</label>
          <input type="date" id="visitDateInput" class="input">
        </div>
        <div>
          <label class="label">긴급도</label>
          <select id="prioritySelect" class="input">
            ${(MASTER_DATA?.priorities || ['일반']).map(p => `<option>${p}</option>`).join('')}
          </select>
        </div>
      </div>

      <!-- 장비별 접수 -->
      <div class="bg-yellow-50 p-4 rounded-lg mb-4">
        <div class="flex justify-between items-center mb-3">
          <h3 class="font-black text-lg">🔧 장비별 접수 내역</h3>
          <button onclick="addEquipmentItem()" class="btn btn-success text-sm">+ 장비 추가</button>
        </div>
        <div id="equipmentItemsContainer"></div>
        
        <div class="bg-white p-4 rounded-lg mt-4 border-2 border-yellow-400">
          <div class="flex justify-between items-center text-lg">
            <strong>📊 전체 합계</strong>
            <strong class="text-2xl text-blue-600" id="grandTotal">0원</strong>
          </div>
        </div>
      </div>

      <!-- 부가세 + 선입금 -->
      <div class="grid md:grid-cols-4 gap-4 mb-4 bg-green-50 p-4 rounded-lg">
        <div>
          <label class="label">세금계산서</label>
          <select id="taxInvoiceSelect" class="input" onchange="calcGrandTotal()">
            ${(MASTER_DATA?.taxInvoices || ['해당없음','발행','미발행']).map(t => `<option>${t}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="label">선입금 금액</label>
          <input type="number" id="paidAmountInput" placeholder="0" class="input">
        </div>
        <div>
          <label class="label">결제수단</label>
          <select id="payMethodSelect" class="input">
            ${(MASTER_DATA?.payMethods || ['현금']).map(m => `<option>${m}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="label">입금예정일</label>
          <input type="date" id="dueDateInput" class="input">
        </div>
      </div>

      <div class="flex gap-3">
        <button onclick="submitNewAS()" class="btn btn-primary flex-1 text-lg py-4">✅ 접수 완료</button>

function addEquipmentItem() {
  const container = document.getElementById('equipmentItemsContainer');
  const idx = itemIndex++;
  
  const itemHtml = `
    <div class="border-2 border-gray-300 rounded-lg p-4 mb-3 bg-white" id="item-${idx}">
      <div class="flex justify-between items-center mb-3">
        <strong class="text-blue-600 text-lg">장비 #${idx + 1}</strong>
        ${idx > 0 ? `<button onclick="removeEquipmentItem(${idx})" class="btn btn-danger text-sm">✕ 삭제</button>` : ''}
      </div>
      
      <div class="grid md:grid-cols-4 gap-3 mb-3">
        <div>
          <label class="label">기구종류 *</label>
          <select id="equipType-${idx}" class="input">
            ${(MASTER_DATA?.equipmentTypes || ['런닝머신']).map(e => `<option>${e}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="label">브랜드</label>
          <select id="brand-${idx}" class="input">
            ${(MASTER_DATA?.brands || ['직접입력']).map(b => `<option>${b}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="label">모델명</label>
          <input type="text" id="modelName-${idx}" class="input">
        </div>
        <div>
          <label class="label">시리얼번호</label>
          <input type="text" id="serialNo-${idx}" class="input">
        </div>
      </div>

      <div class="mb-3">
        <label class="label">고장증상 (필수) *</label>
        <textarea id="symptom-${idx}" class="input" rows="2"></textarea>
      </div>

      <!-- 수량 x 단가 -->
      <div class="bg-blue-50 p-3 rounded-lg mb-3">
        <label class="label text-blue-700">💰 AS비용 (수량 × 단가)</label>
        <div class="grid grid-cols-3 gap-3 mt-2">
          <div>
            <label class="text-xs text-gray-600">수량</label>
            <input type="number" id="qty-${idx}" value="1" min="1" class="input" oninput="calcAsFee(${idx})">
          </div>
          <div>
            <label class="text-xs text-gray-600">단가</label>
            <input type="number" id="unitPrice-${idx}" placeholder="0" class="input" oninput="calcAsFee(${idx})">
          </div>
          <div>
            <label class="text-xs text-gray-600">AS비용</label>
            <input type="number" id="asFee-${idx}" class="input bg-yellow-100 font-bold" readonly>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-3 gap-3 mb-3">
        <div>
          <label class="label">자재비</label>
          <input type="number" id="materialCost-${idx}" placeholder="0" class="input" oninput="calcItemTotal(${idx})">
        </div>
        <div>
          <label class="label">출장비</label>
          <input type="number" id="travelCost-${idx}" placeholder="0" class="input" oninput="calcItemTotal(${idx})">
        </div>
        <div>
          <label class="label">기타비용</label>
          <input type="number" id="otherCost-${idx}" placeholder="0" class="input" oninput="calcItemTotal(${idx})">
        </div>
      </div>

      <div class="bg-gray-100 p-3 rounded-lg text-right">
        <span>소계: <strong id="itemTotal-${idx}" class="text-blue-600 text-xl">0원</strong></span>
        <span class="ml-4 text-sm text-gray-500">(부가세 별도)</span>
      </div>
    </div>
  `;
  
  container.insertAdjacentHTML('beforeend', itemHtml);
}

function removeEquipmentItem(idx) {
  document.getElementById(`item-${idx}`)?.remove();
  calcGrandTotal();
}

function calcAsFee(idx) {
  const qty = Number(document.getElementById(`qty-${idx}`)?.value || 1);
  const unitPrice = Number(document.getElementById(`unitPrice-${idx}`)?.value || 0);
  const asFee = qty * unitPrice;
  
  const el = document.getElementById(`asFee-${idx}`);
  if (el) el.value = asFee;
  
  calcItemTotal(idx);
}

function calcItemTotal(idx) {
  const asFee = Number(document.getElementById(`asFee-${idx}`)?.value || 0);
  const materialCost = Number(document.getElementById(`materialCost-${idx}`)?.value || 0);
  const travelCost = Number(document.getElementById(`travelCost-${idx}`)?.value || 0);
  const otherCost = Number(document.getElementById(`otherCost-${idx}`)?.value || 0);
  const total = asFee + materialCost + travelCost + otherCost;
  
  const el = document.getElementById(`itemTotal-${idx}`);
  if (el) el.textContent = total.toLocaleString() + '원';
  
  calcGrandTotal();
}

function calcGrandTotal() {
  let subTotal = 0;
  for (let i = 0; i < itemIndex; i++) {
    const el = document.getElementById(`itemTotal-${i}`);
    if (el) subTotal += Number(el.textContent.replace(/[^0-9]/g, '') || 0);
  }
  
  // 부가세 계산
  const taxInvoice = document.getElementById('taxInvoiceSelect')?.value || '해당없음';
  let tax = 0;
  if (taxInvoice === '발행') {
    tax = Math.round(subTotal * 0.1);
  }
  
  const grandTotal = subTotal + tax;
  const el = document.getElementById('grandTotal');
  if (el) {
    if (tax > 0) {
      el.innerHTML = `${grandTotal.toLocaleString()}원 <span class="text-sm text-gray-500">(부가세 ${tax.toLocaleString()}원 포함)</span>`;
    } else {
      el.textContent = grandTotal.toLocaleString() + '원';
    }
  }
}

async function searchCustomer() {
  const query = document.getElementById('customerSearchInput').value.trim();
  if (!query) return alert('조회할 연락처 또는 센터명을 입력하세요.');

  const result = await callGAS('lookupCustomer', { q: query });
  const container = document.getElementById('customerSearchResult');

  if (!result || (!result.customer?.customerId && result.histories?.length === 0)) {
    container.innerHTML = '<p class="text-gray-500 text-sm">조회 결과 없음 (신규 고객)</p>';
    return;
  }

  const c = result.customer || {};
  if (c.phone) document.getElementById('phoneInput').value = c.phone;
  if (c.centerName) document.getElementById('centerNameInput').value = c.centerName;
  if (c.customerName) document.getElementById('customerNameInput').value = c.customerName;
  if (c.address) document.getElementById('addressInput').value = c.address;

  container.innerHTML = `
    <div class="bg-white p-3 rounded border-2 border-green-500 text-sm">
      <p class="text-green-700 font-bold mb-2">✅ 고객 정보 자동 입력됨</p>
      <p>${c.centerName || ''} | ${c.customerName || ''} | ${c.phone || ''}</p>
      ${result.histories?.length > 0 ? `
        <div class="mt-2 pt-2 border-t text-xs text-gray-500">
          최근 AS: ${result.histories.length}건
        </div>
      ` : ''}
    </div>
  `;
}
async function submitNewAS() {
  const phone = document.getElementById('phoneInput').value.trim();
  if (!phone) return alert('연락처를 입력하세요.');

  const items = [];
  for (let i = 0; i < itemIndex; i++) {
    const symptomEl = document.getElementById(`symptom-${i}`);
    if (!symptomEl) continue;
    
    const symptom = symptomEl.value.trim();
    if (!symptom) {
      alert(`장비 #${i+1}의 고장증상을 입력하세요.`);
      return;
    }

    items.push({
      equipmentType: document.getElementById(`equipType-${i}`)?.value || '',
      brand: document.getElementById(`brand-${i}`)?.value || '',
      modelName: document.getElementById(`modelName-${i}`)?.value || '',
      serialNo: document.getElementById(`serialNo-${i}`)?.value || '',
      symptom,
      asFee: Number(document.getElementById(`asFee-${i}`)?.value || 0),
      materialCost: Number(document.getElementById(`materialCost-${i}`)?.value || 0),
      travelCost: Number(document.getElementById(`travelCost-${i}`)?.value || 0),
      otherCost: Number(document.getElementById(`otherCost-${i}`)?.value || 0)
    });
  }

  if (items.length === 0) return alert('최소 1개 이상의 장비를 입력하세요.');

  const data = {
    phone,
    centerName: document.getElementById('centerNameInput').value.trim(),
    customerName: document.getElementById('customerNameInput').value.trim(),
    customerType: document.getElementById('customerTypeSelect').value,
    address: document.getElementById('addressInput').value.trim(),
    channel: document.getElementById('channelSelect').value,
    technician: document.getElementById('technicianSelect').value,
    visitDate: document.getElementById('visitDateInput').value,
    priority: document.getElementById('prioritySelect').value,
    taxInvoice: document.getElementById('taxInvoiceSelect').value,
    paidAmount: Number(document.getElementById('paidAmountInput').value || 0),
    payMethod: document.getElementById('payMethodSelect').value,
    dueDate: document.getElementById('dueDateInput').value,
    items
  };

  try {
    const result = await callGAS('saveAS', {
      data: encodeURIComponent(JSON.stringify(data))
    });

    if (result.asNos) {
      // ★★★ 단건/다건 구분하여 메시지 출력 ★★★
      let message = `✅ 접수 완료!\n\n`;
      message += `접수번호: ${result.asNos.join(', ')}\n`;
      
      if (result.isMultiple && result.groupNo) {
        message += `묶음번호: ${result.groupNo}\n`;
        message += `총 ${result.count}건 묶음 접수`;
      } else {
        message += `총 1건 접수`;
      }
      
      alert(message);
      switchTab('home');
    }
  } catch (err) {}
}

  const data = {
    asNo,
    status: document.getElementById('editStatus')?.value,
    technician: document.getElementById('editTechnician')?.value,
    priority: document.getElementById('editPriority')?.value,
    visitDate: document.getElementById('editVisitDate')?.value,
    taxInvoice: document.getElementById('editTaxInvoice')?.value,
    repairDetail: document.getElementById('editRepairDetail')?.value
  };

  try {
    await callGAS('saveASUpdate', { data: encodeURIComponent(JSON.stringify(data)) });
    alert('✅ 저장 완료');
    closeModal();
    viewASDetail(asNo);
  } catch (err) {}
}

// ★★★ 사진 업로드 ★★★
async function uploadPhoto(asNo, photoType, inputEl) {
  const file = inputEl.files[0];
  if (!file) return;
  
  if (!file.type.startsWith('image/')) {
    alert('이미지 파일만 업로드 가능합니다.');
    inputEl.value = '';
    return;
  }
  
  if (file.size > 10 * 1024 * 1024) {
    alert('파일 크기는 10MB 이하만 가능합니다.');
    inputEl.value = '';
    return;
  }
  
  try {
    showLoading(true);
    
    // 파일을 base64로 변환
    const dataUrl = await fileToDataUrl(file);

// 파일을 DataURL로 변환
function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function loadReceivableData() {

  try {
    await callGAS('addGroupPayment', { data: encodeURIComponent(JSON.stringify(data)) });
    alert('✅ 묶음 입금 완료');
    closeGroupPayModal();
    loadReceivableData();
  } catch (err) {}
}  

// =====================================================
// 월마감 탭
// =====================================================
function renderMonthlyTab() {
  const container = document.getElementById('tab-monthly');
  const currentMonth = new Date().toISOString().slice(0, 7);
  
  container.innerHTML = `
    <div class="card">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-black">📊 월마감 리포트</h2>
        <div class="flex gap-3">
          <input type="month" id="monthInput" value="${currentMonth}" class="input" style="width:180px;">
          <button onclick="loadMonthlyReport()" class="btn btn-primary">📅 조회</button>
        </div>
      </div>
      <div id="monthlyContainer"></div>
    </div>
  `;
  
  loadMonthlyReport();
}

        </div>
        <div class="card bg-orange-50 text-center">
          <div class="text-xs mb-2">월말 미수금</div>

        </div>
      </div>

      <div class="grid md:grid-cols-3 gap-4 mb-6">
        <div class="card bg-yellow-50">
          <div class="text-xs">자재비</div>
          <div class="text-xl font-bold">${(r.summary.materialCostTotal || 0).toLocaleString()}원</div>
        </div>
        <div class="card bg-indigo-50">
          <div class="text-xs">세금</div>
          <div class="text-xl font-bold">${(r.summary.taxTotal || 0).toLocaleString()}원</div>
        </div>
        <div class="card bg-teal-50">
          <div class="text-xs">이번달 입금</div>
          <div class="text-xl font-bold">${(r.summary.collectionInMonth || 0).toLocaleString()}원</div>
        </div>
      </div>

      <div class="card">
        <h3 class="font-black text-xl mb-4">👷 기사별 실적</h3>
        <div class="overflow-x-auto">

                <th class="border p-2 text-right">매출</th>

                  <td class="border p-2 text-right">${(t.sales || 0).toLocaleString()}원</td>
                  <td class="border p-2 text-right text-red-600">${(t.materialCost || 0).toLocaleString()}원</td>
                  <td class="border p-2 text-right text-purple-600">${(t.receivable || 0).toLocaleString()}원</td>

      <div class="card mt-4">
        <h3 class="font-black text-xl mb-4">🔧 기구별 실적</h3>

              <tr>
                <th class="border p-2 text-left">기구종류</th>
                <th class="border p-2 text-center">건수</th>

              </tr>
            </thead>
            <tbody>
              ${r.equipmentSummary?.map(e => `
                <tr>
                  <td class="border p-2 font-bold">${e.equipmentType}</td>

  }
}

function showLoading(show) {
  document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
}

document.addEventListener('click', (e) => {
  if (e.target.classList.contains('tab-btn')) {
    switchTab(e.target.dataset.tab);
  }
});

window.addEventListener('DOMContentLoaded', initApp);

</script>
